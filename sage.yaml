name: "image-sampler2"
description: "Enhanced image sampler: capture-time naming, self-describing EXIF/JSON provenance, dual upload+local-cache, fleet-portable node identity."
version: "0.1.0"
namespace: "beckman"
authors: "Pete Beckman <beckman@deepiron.com>"
collaborators: "Waggle Team <https://wa8.gl>"
funding:
license: "The license agreed by Argonne National Laboratory"
keywords: "image, sampling, camera, periodic sampling, trigger-based sampling, exif, provenance"
homepage: "https://github.com/flint-pete/image-sampler2/blob/main/ecr-meta/ecr-science-description.md"
source:
  architectures:
    - "linux/arm64"
    - "linux/amd64"
  url: "https://github.com/flint-pete/image-sampler2.git"
  branch: "main"
# NOTE on credentials: camera credentials are read from the environment
# (CAMERA_USER / CAMERA_PASSWORD) ONLY -- never as args -- to keep them out of
# argv/process listings/scheduler records. Inject them via a Kubernetes Secret
# referenced by the job's pod spec (envFrom/secretRef), not as inputs here.
#
# NOTE on node identity: vsn / node_id / lat / lon auto-resolve from the on-node
# /etc/waggle/node-manifest-v2.json, so they are OPTIONAL overrides below.
inputs:
  - id: "one-shot"
    type: "boolean"
  - id: "continuous"
    type: "int"
  - id: "stream"
    type: "string"
  - id: "camera-name"
    type: "string"
  - id: "camera-host"
    type: "string"
  - id: "camera-port"
    type: "int"
  - id: "camera-channel"
    type: "int"
  - id: "capture-timeout"
    type: "float"
  - id: "vsn"
    type: "string"
  - id: "lat"
    type: "float"
  - id: "lon"
    type: "float"
  - id: "plugin-version"
    type: "string"
  - id: "job"
    type: "string"
  - id: "task"
    type: "string"
  - id: "cache-dir"
    type: "string"
  - id: "cache-name"
    type: "string"
